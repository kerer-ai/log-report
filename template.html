<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CI/CD 构建看板</title>
<style>
:root {
  --bg: #0f172a;
  --card-bg: #1e293b;
  --border: #334155;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --blue: #3b82f6;
  --green: #22c55e;
  --red: #ef4444;
  --amber: #f59e0b;
  --pre-build: #3b82f6;
  --build: #22c55e;
  --unattributed: #475569;
  --radius: 8px;
  --radius-sm: 4px;
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  line-height: 1.5;
  padding: 16px 20px 40px;
  max-width: 1600px;
  margin: 0 auto;
}

/* === HEADER === */
.header { margin-bottom: 20px; }
.header-top {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 8px;
}
.header-title { font-size: 1.5rem; font-weight: 700; }
.header-time { color: var(--text-muted); font-size: 0.85rem; }

.header-stats {
  display: flex; gap: 24px; margin-bottom: 12px;
  font-size: 0.95rem; color: var(--text-secondary);
}
.header-stats .stat-value { font-weight: 700; font-size: 1.2rem; }
.header-stats .stat-label { margin-left: 4px; }
.stat-pass { color: var(--green); }
.stat-fail { color: var(--red); }


/* === INSIGHTS === */
.insights {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 14px; margin-bottom: 24px;
}
.insight-card {
  background: var(--card-bg); border-radius: var(--radius);
  padding: 16px; border-left: 3px solid var(--border);
  box-shadow: var(--shadow);
}
.insight-card:nth-child(1) { border-left-color: var(--blue); }
.insight-card:nth-child(2) { border-left-color: var(--red); }
.insight-card:nth-child(3) { border-left-color: var(--amber); }
.insight-card:nth-child(4) { border-left-color: #a855f7; }

.insight-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.insight-value { font-size: 2rem; font-weight: 700; margin: 4px 0; }
.insight-sub { font-size: 0.8rem; color: var(--text-secondary); }

/* === RANKING TABLE === */
.ranking { margin-bottom: 24px; }
.section-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}
.section-title { font-size: 1.1rem; font-weight: 600; }
.section-toggle { font-size: 0.8rem; color: var(--blue); cursor: pointer; background: none; border: none; }

.ranking-table {
  width: 100%; border-collapse: collapse;
  background: var(--card-bg); border-radius: var(--radius);
  overflow: hidden; box-shadow: var(--shadow);
}
.ranking-table th {
  text-align: left; padding: 10px 12px; font-size: 0.8rem;
  color: var(--text-muted); text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}
.ranking-table td {
  padding: 8px 12px; font-size: 0.9rem;
  border-bottom: 1px solid var(--border);
}
.ranking-table tr:last-child td { border-bottom: none; }
.ranking-table tr:hover { background: rgba(255,255,255,0.03); }

.dot-red { color: var(--red); font-size: 1.2rem; }
.dot-yellow { color: var(--amber); font-size: 1.2rem; }
.dot-green { color: var(--green); font-size: 1.2rem; }

.bottleneck-red { color: var(--red); font-weight: 700; }
.bottleneck-amber { color: var(--amber); font-weight: 600; }
.bottleneck-gray { color: var(--text-secondary); }

.repo-link { color: var(--blue); text-decoration: none; cursor: pointer; }
.repo-link:hover { text-decoration: underline; }
.detail-arrow { color: var(--text-muted); text-decoration: none; font-size: 1.1rem; }
.detail-arrow:hover { color: var(--blue); }

/* === MODAL === */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); z-index: 1000; overflow-y: auto;
}
.modal-overlay.open { display: flex; justify-content: center; align-items: center; padding: 20px; }
.modal-content {
  background: var(--card-bg); border-radius: var(--radius);
  max-width: 900px; width: 100%; max-height: 85vh; overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--card-bg); z-index: 10;
}
.modal-title { font-weight: 700; font-size: 1.1rem; }
.modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.4rem; cursor: pointer; }
.modal-close:hover { color: var(--text-primary); }
.modal-body { padding: 16px 20px; }

.build-card {
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  margin-bottom: 12px; overflow: hidden;
}
.build-card-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px; cursor: pointer; background: rgba(0,0,0,0.15);
}
.build-card-header:hover { background: rgba(255,255,255,0.03); }
.build-card-body { display: none; padding: 10px 14px; }
.build-card-body.open { display: block; }

.build-bar { display: flex; height: 16px; border-radius: 3px; overflow: hidden; margin: 6px 0; }
.build-bar-pre { background: var(--blue); }
.build-bar-build { background: var(--green); }
.build-bar-unatt { background: var(--border); }

.action-table {
  width: 100%; border-collapse: collapse; font-size: 0.82rem;
}
.action-table th { text-align: left; padding: 3px 8px; color: var(--text-muted); border-bottom: 1px solid var(--border); }
.action-table td { padding: 3px 8px; }

.ranking-summary {
  display: flex; gap: 20px; padding: 10px 12px;
  font-size: 0.8rem; color: var(--text-muted);
  background: rgba(0,0,0,0.2); border-radius: 0 0 var(--radius) var(--radius);
}

/* === REPO CARDS === */
.repo-cards { display: flex; flex-direction: column; gap: 16px; }

.repo-card {
  background: var(--card-bg); border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden;
}
.repo-card-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  cursor: pointer; position: sticky; top: 0;
  background: var(--card-bg); z-index: 10;
}
.repo-card-header:hover { background: rgba(255,255,255,0.03); }

.repo-name { font-weight: 700; font-size: 1.05rem; }
.repo-meta { font-size: 0.8rem; color: var(--text-secondary); }
.repo-toggle { font-size: 0.8rem; color: var(--blue); background: none; border: none; cursor: pointer; }

.build-item {
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.15s;
}
.build-item:last-child { border-bottom: none; }
.build-item:hover { background: rgba(255,255,255,0.02); }

.build-summary {
  display: flex; align-items: center; gap: 12px;
}
.build-task-name { font-weight: 600; font-size: 0.9rem; min-width: 180px; }
.build-total-time { font-size: 0.85rem; color: var(--text-secondary); min-width: 70px; }

.build-bar-wrapper { flex: 1; display: flex; align-items: center; gap: 6px; }
.build-bar {
  height: 8px; border-radius: 4px; display: flex; overflow: hidden;
  flex: 1; min-width: 100px; background: transparent;
}
.build-bar-pre { background: var(--pre-build); height: 100%; }
.build-bar-build { background: var(--build); height: 100%; flex: 1; }

.build-bar-label { font-size: 0.7rem; color: var(--text-muted); white-space: nowrap; }

.build-status { font-size: 0.8rem; font-weight: 600; }
.build-status.passed { color: var(--green); }
.build-status.failed { color: var(--red); }

/* Expandable build detail */
.build-detail {
  max-height: 0; overflow: hidden;
  transition: max-height 0.3s ease;
}
.build-detail.open { max-height: none; overflow: visible; }
.build-detail-inner {
  padding: 12px 0 0 0; margin-top: 10px;
  border-top: 1px solid var(--border);
  max-height: 600px; overflow-y: auto;
}

.action-table {
  width: 100%; border-collapse: collapse; font-size: 0.85rem;
}
.action-table th {
  text-align: left; padding: 4px 8px; color: var(--text-muted);
  font-weight: 500; font-size: 0.75rem; border-bottom: 1px solid var(--border);
}
.action-table td { padding: 4px 8px; }
.action-warn { color: var(--red); font-weight: 600; }

.repo-card-footer {
  padding: 10px 16px; font-size: 0.8rem; color: var(--text-muted);
  border-top: 1px solid var(--border); background: rgba(0,0,0,0.15);
}

/* Error state */
.build-error {
  color: var(--red); padding: 8px 16px; font-size: 0.85rem;
}

/* Responsive */
@media (max-width: 768px) {
  body { padding: 10px; }
  .header-title { font-size: 1.2rem; }
  .insights { grid-template-columns: repeat(2, 1fr); }
  .build-summary { flex-wrap: wrap; }
  .build-task-name { min-width: auto; flex: 1; }
  .ranking-table { font-size: 0.8rem; }
  .ranking-table th:nth-child(4),
  .ranking-table td:nth-child(4) { display: none; }
}

@media (max-width: 480px) {
  .insights { grid-template-columns: 1fr; }
  .ranking-table th:nth-child(3),
  .ranking-table td:nth-child(3) { display: none; }
}
</style>
</head>
<body>

<!-- Layer 1: Header -->
<header class="header">
  <div class="header-top">
    <h1 class="header-title">🔧 CI/CD 环境准备 & 构建分析看板</h1>
    <span class="header-time" id="updateTime">—</span>
  </div>
  <div class="header-stats" id="headerStats"></div>
</header>

<!-- Layer 2: Insight Cards -->
<section class="insights" id="insights"></section>

<!-- Layer 3: Pre-Build Ranking -->
<section class="ranking" id="ranking"></section>


<!-- Embedded Data -->
<script>
const __EMBEDDED_DATA__ = {{DATA_JSON}};

// ── Utility Functions ──

function fmtDuration(seconds) {
  if (seconds == null || isNaN(seconds)) return '—';
  const s = Math.round(seconds);
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return sec > 0 ? m + 'm' + sec + 's' : m + 'm';
}

function fmtTime(isoStr) {
  if (!isoStr) return '—';
  try {
    const d = new Date(isoStr);
    return d.toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
  } catch { return '—'; }
}

function fmtDateTimeShort(isoStr) {
  if (!isoStr) return '—';
  try {
    const d = new Date(isoStr);
    return d.toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' });
  } catch { return '—'; }
}

function repoShortName(repo) {
  return repo._repo_short || repo.meta.repo.split('/').pop();
}

// Flatten all builds with repo context
function allBuilds(repos) {
  const result = [];
  repos.forEach(repo => {
    (repo.builds || []).forEach(build => {
      result.push({ repo, build });
    });
  });
  return result;
}

// Get valid builds (no _error, has time)
function validBuilds(repos) {
  return allBuilds(repos).filter(({build}) => !build._error && build.time);
}

// ── Filter State ──



// ── Initialization ──

function init() {
  if (!__EMBEDDED_DATA__ || __EMBEDDED_DATA__.length === 0) {
    document.body.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)">暂无数据</div>';
    return;
  }
  const repos = __EMBEDDED_DATA__;
  renderHeader(repos);
  renderInsights(repos);
  renderRanking(repos);
}

// ── Modal (Repo Detail) ──

const allRepos = () => __EMBEDDED_DATA__ || [];

function openRepoDetail(name) {
  const repo = allRepos().find(r => r._repo_short === name);
  if (!repo) return;
  document.getElementById('modalTitle').innerHTML = repo.meta.repo + ' (<a href="' + (repo.meta.pr_url || '#') + '" target="_blank" style="color:var(--blue)">PR #' + repo.meta.pr + '</a>)';
  document.getElementById('modalBody').innerHTML = renderRepoDetail(repo);
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('open');
}

function renderRepoDetail(repo) {
  const builds = repo.builds || [];
  return builds.map(b => renderBuildCard(b)).join('')
    + '<div style="padding-top:8px;font-size:0.8rem;color:var(--text-muted)">'
    + '更新于: ' + (repo.meta.fetched_at || '—').substring(0,16)
    + ' · 流水线: <a href="' + (repo.meta.pipeline_url || '#') + '" target="_blank" style="color:var(--blue)">→</a>'
    + '</div>';
}

function renderBuildCard(build) {
  if (build._error) {
    return '<div class="build-card"><div class="build-card-header" style="color:var(--red)">⚠ ' + build.task_name + ': ' + build._error + '</div></div>';
  }
  const dur = build.time?.duration_seconds || 0;
  const pre = build.pre_build?.total_seconds || 0;
  const bld = build.build_phases?.total_seconds || 0;
  const unatt = build.summary?.unattributed_seconds || 0;
  const preW = dur > 0 ? (pre / dur * 100).toFixed(1) : 0;
  const bldW = dur > 0 ? (bld / dur * 100).toFixed(1) : 0;
  const unattW = dur > 0 ? (unatt / dur * 100).toFixed(1) : 0;
  const actions = build.pre_build?.actions?.filter(a => a.duration_seconds > 0) || [];
  const bpActions = build.build_phases?.actions?.filter(a => a.duration_seconds > 0) || [];
  const id = 'bc_' + Math.random().toString(36).slice(2,8);

  return '<div class="build-card">'
    + '<div class="build-card-header" onclick="document.getElementById(\'' + id + '\').classList.toggle(\'open\')">'
    + '<span><b>' + build.task_name + '</b> <span style="color:var(--text-muted);font-size:0.8rem">' + (build._arch || '') + '</span></span>'
    + '<span style="font-size:0.8rem">' + fmtDuration(dur) + ' · Pre ' + preW + '% · Build ' + bldW + '%</span>'
    + '</div>'
    + '<div class="build-card-body" id="' + id + '">'
    + '<div class="build-bar"><div class="build-bar-pre" style="width:' + preW + '%"></div><div class="build-bar-build" style="width:' + bldW + '%"></div><div class="build-bar-unatt" style="width:' + unattW + '%"></div></div>'
    + '<div style="font-weight:600;margin:8px 0 4px;font-size:0.85rem">环境准备: ' + fmtDuration(pre) + ' (' + preW + '%) · orchestrator: ' + (build.pre_build?.orchestrator || '—') + '</div>'
    + (actions.length ? '<table class="action-table"><tr><th>动作</th><th>开始</th><th>结束</th><th>耗时</th></tr>'
      + actions.map(a => '<tr><td>' + a.name + '</td><td style="font-size:0.75rem">' + (a.start || '').substring(11,19) + '</td><td style="font-size:0.75rem">' + (a.end || '').substring(11,19) + '</td><td>' + fmtDuration(a.duration_seconds) + '</td></tr>').join('')
      + '</table>' : '')
    + (bpActions.length ? '<div style="font-weight:600;margin:10px 0 4px;font-size:0.85rem">构建阶段: ' + fmtDuration(bld) + ' (' + bldW + '%)</div>'
      + '<table class="action-table"><tr><th>阶段</th><th>耗时</th></tr>'
      + bpActions.map(a => '<tr><td>' + a.name + '</td><td>' + fmtDuration(a.duration_seconds || 0) + '</td></tr>').join('')
      + '</table>' : '')
    + '</div></div>';
}

document.addEventListener('DOMContentLoaded', init);
</script>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

</body>
</html>
